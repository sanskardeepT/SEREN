name: Train and Export ML Models

on:
  workflow_dispatch:
  push:
    paths:
      - 'training/**'
      - '.github/workflows/train_models.yml'

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install tensorflow numpy pandas scikit-learn

      - name: Run training script
        run: |
          python training/train_all_models.py > training.log 2>&1
        continue-on-error: true

      - name: Commit and push TFLite models or logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Detect if any model fell back to synthetic in the training logs
          COMMIT_MSG="chore(ml): [REAL DATASET] retrained clinical models"
          if grep -qi "Falling back to" training.log || grep -qi "synthetic" training.log; then
            COMMIT_MSG="chore(ml): [SYNTHETIC FALLBACK - NO REAL DATASET IN CI] retrained models or logs"
          fi
          
          git add training.log app/src/main/assets/*.tflite || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "$COMMIT_MSG" && git push)
